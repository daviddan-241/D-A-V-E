<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>D.A.V.E. | Anonymous Infinity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #fafafa; color: #1a1a1a; -webkit-tap-highlight-color: transparent; }
        .ios-card { background: #ffffff; border-radius: 32px; box-shadow: 0 4px 30px rgba(0,0,0,0.02); border: 1px solid #f0f0f0; }
        .btn-fire { background: #000; color: #fff; border-radius: 20px; font-weight: 700; padding: 22px; width: 100%; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-fire:active { transform: scale(0.95); opacity: 0.8; }
        .sidebar { transition: width 0.3s; width: 280px; }
        .sidebar.collapsed { width: 88px; }
        .badge-anon { background: #f0fdf4; color: #16a34a; font-size: 10px; font-bold; padding: 4px 10px; border-radius: 99px; }
        .safe-top { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body x-data="dave()" class="h-screen overflow-hidden flex">

    <!-- iOS Collapsible Sidebar -->
    <aside :class="collapsed ? 'collapsed' : ''" class="sidebar h-full bg-white border-r border-gray-100 flex flex-col z-50">
        <div class="px-6 py-12 safe-top flex items-center">
            <div @click="collapsed = !collapsed" class="cursor-pointer bg-black w-12 h-12 rounded-2xl flex items-center justify-center text-white font-black italic shadow-xl">D</div>
            <h1 x-show="!collapsed" x-transition.opacity class="ml-4 text-2xl font-black tracking-tight">D.A.V.E.</h1>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <template x-for="item in menu">
                <button @click="tab = item.id" :class="tab === item.id ? 'bg-gray-50 text-black' : 'text-gray-400'" 
                        class="w-full flex items-center px-4 py-4 rounded-2xl transition-all">
                    <span class="text-2xl" x-text="item.icon"></span>
                    <span x-show="!collapsed" class="ml-4 font-bold text-sm" x-text="item.name"></span>
                </button>
            </template>
        </nav>
        <div class="p-6">
            <button @click="collapsed = !collapsed" class="w-full flex justify-center text-gray-300">
                <span x-text="collapsed ? '⇢' : '⇠'" class="text-2xl"></span>
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 h-full overflow-y-auto relative flex flex-col pb-32">
        <header class="sticky top-0 bg-white/80 backdrop-blur-xl px-8 py-8 safe-top flex justify-between items-center border-b border-gray-100 z-40">
            <div>
                <h2 class="text-3xl font-black tracking-tighter" x-text="menu.find(m => m.id === tab).name"></h2>
                <div class="flex items-center gap-2 mt-1">
                    <span class="badge-anon">ANONYMOUS TOR ROUTING</span>
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                </div>
            </div>
            <div class="w-10 h-10 bg-gray-100 rounded-full border border-gray-200"></div>
        </header>

        <div class="p-8 space-y-8 flex-1">
            
            <!-- CORE FIRE -->
            <div x-show="tab === 'dash'" class="space-y-8">
                <div class="ios-card p-10 text-center bg-gray-50 border-gray-200">
                    <h3 class="text-lg font-bold mb-6">Initialize Global Swarm</h3>
                    <button @click="fire()" class="btn-fire shadow-2xl shadow-black/20" x-text="firing ? 'SWARM ONLINE...' : 'FIRE ALL PIPELINES'"></button>
                    <p class="mt-6 text-[10px] text-gray-400 font-bold uppercase tracking-widest">Everything is automatically routed to XMR</p>
                </div>

                <!-- Stats Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="ios-card p-8 bg-black text-white">
                        <p class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Vault Balance (Monero)</p>
                        <h4 class="text-5xl font-black tracking-tighter mt-2" x-text="state.xmr + ' XMR'"></h4>
                        <p class="text-xs mt-4 opacity-70" x-text="'Processing Pool: $' + state.usd"></p>
                    </div>
                    <div class="ios-card p-8">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Privacy Level</p>
                        <div class="flex items-end justify-between mt-2">
                            <h4 class="text-4xl font-black tracking-tighter">MAXIMUM</h4>
                            <div class="text-green-500 font-black italic">SHIELDED</div>
                        </div>
                    </div>
                </div>

                <!-- Neural Stream -->
                <div class="ios-card p-8">
                    <h3 class="font-black text-xl mb-6 italic tracking-tight">Neural Privacy Stream</h3>
                    <div class="space-y-4 max-h-96 overflow-y-auto pr-2">
                        <template x-for="log in state.logs">
                            <div class="flex gap-4 items-start border-b border-gray-50 pb-4 last:border-0">
                                <div class="w-1.5 h-1.5 rounded-full mt-2 shrink-0" 
                                     :class="log.type === 'PRIVATE' ? 'bg-green-500' : 'bg-black'"></div>
                                <div class="flex-1">
                                    <p class="text-sm font-bold text-gray-800" x-text="log.msg"></p>
                                    <p class="text-[9px] font-black text-gray-300 mt-1 uppercase" x-text="log.time + ' • ' + log.type"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- SETTLEMENT -->
            <div x-show="tab === 'settle'" class="max-w-xl mx-auto ios-card p-10">
                <h3 class="text-2xl font-black text-center mb-10">XMR Exit Node</h3>
                <div class="space-y-8">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-3 tracking-widest px-1">Receiver Monero Address</label>
                        <input type="text" x-model="address" class="w-full bg-gray-50 border-0 rounded-2xl p-6 text-xs font-mono outline-none focus:ring-2 focus:ring-black" placeholder="44AFF...">
                    </div>
                    <button @click="save()" class="btn-fire !bg-blue-600">Secure Settlement Path</button>
                    <div class="p-6 bg-blue-50 rounded-3xl text-center">
                        <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Tor-Enabled Atomic Swaps Active</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function dave() {
            return {
                collapsed: true,
                tab: 'dash',
                address: '',
                firing: false,
                state: { usd: 0, xmr: 0, logs: [], privacy: '' },
                menu: [
                    { id: 'dash', name: 'Dashboard', icon: '⚡' },
                    { id: 'settle', name: 'Settlement', icon: '💎' }
                ],
                init() {
                    setInterval(() => this.poll(), 3000);
                    if (window.innerWidth < 768) this.collapsed = true;
                },
                poll() {
                    fetch('/api/state').then(r => r.json()).then(data => {
                        this.state = data;
                        if (!this.address) this.address = data.address;
                    });
                },
                fire() {
                    this.firing = true;
                    fetch('/api/fire', { method: 'POST' }).then(() => {
                        setTimeout(() => { this.firing = false; }, 1500);
                    });
                },
                save() {
                    fetch('/api/config', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({address: this.address})
                    }).then(() => alert('Anonymous Tunnel Synchronized.'));
                }
            }
        }
    </script>
</body>
</html>
