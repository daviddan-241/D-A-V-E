<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZORG-Ω | D.A.V.E Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #F8F9FA; -webkit-tap-highlight-color: transparent; }
        .ios-blur { background: rgba(255,255,255,0.7); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 20px; }
        .ios-card { background: #fff; border-radius: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 0.5px solid #f0f0f0; }
        .sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 280px; }
        .sidebar.collapsed { width: 88px; }
        .btn-fire { background: linear-gradient(135deg, #007aff, #00c6ff); color: #fff; border-radius: 18px; font-weight: 700; padding: 20px; width: 100%; box-shadow: 0 10px 30px rgba(0,122,255,0.25); }
        .btn-fire:active { transform: scale(0.96); opacity: 0.9; }
        .safe-area-top { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body x-data="dave()" class="h-screen overflow-hidden flex">

    <!-- Collapsible Sidebar -->
    <aside :class="collapsed ? 'collapsed' : ''" class="sidebar h-full bg-white border-r border-gray-100 flex flex-col z-50">
        <div class="px-6 py-10 safe-area-top flex items-center h-28">
            <div @click="collapsed = !collapsed" class="cursor-pointer flex items-center">
                <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-white shadow-xl">
                    <span class="text-xl font-bold italic">D</span>
                </div>
                <h1 x-show="!collapsed" class="ml-4 text-2xl font-bold tracking-tight">D.A.V.E.</h1>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <template x-for="item in menu">
                <button @click="tab = item.id" 
                        :class="tab === item.id ? 'bg-gray-100 text-black' : 'text-gray-400 hover:bg-gray-50'"
                        class="w-full flex items-center px-4 py-4 rounded-2xl transition-all">
                    <span class="text-2xl" x-text="item.icon"></span>
                    <span x-show="!collapsed" class="ml-4 font-bold text-sm" x-text="item.name"></span>
                </button>
            </template>
        </nav>
        <div class="p-6">
            <div x-show="!collapsed" class="bg-blue-50 p-5 rounded-3xl mb-6">
                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Active Revenue</p>
                <p class="text-xl font-black text-blue-600 mt-1" x-text="'$' + revenue"></p>
            </div>
            <button @click="collapsed = !collapsed" class="w-full flex justify-center text-gray-300">
                <span x-text="collapsed ? '⇢' : '⇠'" class="text-2xl"></span>
            </button>
        </div>
    </aside>

    <!-- Main Command -->
    <main class="flex-1 h-full overflow-y-auto bg-[#F8F9FA] relative flex flex-col">
        <header class="ios-blur sticky top-0 px-8 py-8 safe-area-top flex justify-between items-center z-40 border-b border-gray-100">
            <div>
                <h2 class="text-3xl font-black tracking-tight" x-text="menu.find(m => m.id === tab).name"></h2>
                <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mt-1">212 Workers Operational</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            </div>
        </header>

        <div class="p-8 space-y-8 flex-1 pb-32">
            <!-- ENGINE FIRE CONTROL -->
            <div x-show="tab === 'dash'" class="space-y-8">
                
                <!-- THE ONE BUTTON (FIRE ALL) -->
                <div class="ios-card p-10 text-center">
                    <h3 class="text-xl font-bold mb-6 italic">Synchronize Global Swarm</h3>
                    <button @click="fireAll()" :disabled="firing" 
                            class="btn-fire" 
                            x-text="firing ? 'FIRING AGENTS...' : 'FIRE ALL PIPELINES'"></button>
                    <p class="mt-6 text-xs text-gray-400 font-bold uppercase tracking-widest">Start making money instantly before config</p>
                </div>

                <!-- Live Status Heatmap -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="ios-card p-8 flex flex-col justify-between h-48 bg-black text-white">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Total Unrealized</p>
                        <h4 class="text-5xl font-black tracking-tighter" x-text="'$' + revenue"></h4>
                        <div class="w-full bg-white/20 h-1.5 rounded-full mt-6 overflow-hidden">
                            <div class="bg-blue-400 h-full transition-all duration-1000" :style="'width: ' + (revenue/1.5) + '%'"></div>
                        </div>
                    </div>
                    <div class="ios-card p-8 h-48 flex flex-col justify-between">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Gift Cards Generated</p>
                        <div class="flex items-end justify-between">
                            <h4 class="text-5xl font-black tracking-tighter">$425.00</h4>
                            <div class="bg-orange-100 p-3 rounded-2xl">📦</div>
                        </div>
                    </div>
                </div>

                <!-- Activity Log -->
                <div class="ios-card p-8">
                    <h3 class="text-lg font-bold mb-6">Neural Stream</h3>
                    <div class="space-y-4 max-h-96 overflow-y-auto">
                        <template x-for="log in logs">
                            <div class="flex items-start gap-4 pb-4 border-b border-gray-50 last:border-0">
                                <div class="w-1.5 h-1.5 rounded-full bg-blue-500 mt-2 shrink-0"></div>
                                <div>
                                    <p class="text-sm font-bold text-gray-800 leading-snug" x-text="log.msg"></p>
                                    <p class="text-[9px] font-bold text-gray-300 mt-1 uppercase" x-text="log.time"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- SETTLEMENT -->
            <div x-show="tab === 'settle'" class="max-w-xl mx-auto ios-card p-10">
                <h3 class="text-2xl font-black mb-10 tracking-tight text-center">Settlement Hub</h3>
                <div class="space-y-8">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-3 tracking-widest">Monero (XMR) Address</label>
                        <input type="text" x-model="address" class="w-full bg-gray-50 border-none rounded-2xl px-6 py-5 text-xs font-mono outline-none focus:ring-2 focus:ring-blue-600 transition-all" placeholder="44AFF...">
                    </div>
                    <button @click="save()" class="btn-fire !py-5">Synchronize Payout Path</button>
                    <div class="grid grid-cols-2 gap-4">
                        <button class="bg-gray-100 p-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest">Amazon Cards</button>
                        <button class="bg-gray-100 p-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest">Visa Prepaid</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function dave() {
            return {
                collapsed: true,
                tab: 'dash',
                revenue: 0.0,
                address: '',
                firing: false,
                menu: [
                    { id: 'dash', name: 'Dashboard', icon: '🚀' },
                    { id: 'nodes', name: 'Neural Grid', icon: '🧠' },
                    { id: 'settle', name: 'Settlement', icon: '💎' }
                ],
                logs: [],
                init() {
                    setInterval(() => this.poll(), 3000);
                    if (window.innerWidth < 768) this.collapsed = true;
                },
                poll() {
                    fetch('/api/state').then(r => r.json()).then(data => {
                        this.revenue = data.revenue;
                        this.logs = data.logs;
                        if (!this.address) this.address = data.address;
                    });
                },
                fireAll() {
                    this.firing = true;
                    fetch('/api/fire', { method: 'POST' }).then(() => {
                        setTimeout(() => { this.firing = false; }, 2000);
                    });
                },
                save() {
                    fetch('/api/config', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({address: this.address})
                    }).then(() => alert('Swarm Synchronized.'));
                }
            }
        }
    </script>
</body>
</html>
